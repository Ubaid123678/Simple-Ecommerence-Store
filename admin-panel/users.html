<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users — NovaMart Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebar-root"></div>
        <div class="main-content">
            <div id="topbar-root"></div>
            <div class="page-content">
                <div class="panel">
                    <div class="panel-header">
                        <h2>All Customers</h2>
                        <span id="userCount" style="color:var(--text-muted);font-size:.85rem"></span>
                    </div>
                    <div class="panel-body">
                        <table class="data-table">
                            <thead><tr><th>Customer</th><th>Email</th><th>Joined</th></tr></thead>
                            <tbody id="usersTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin-api.js"></script>
    <script src="js/admin-ui.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/admin-socket.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initAdminPage('users', 'Users');
            loadUsers();
        });

        async function loadUsers() {
            const tbody = document.getElementById('usersTable');
            try {
                const users = await AdminAPI.getUsers();
                document.getElementById('userCount').textContent = `${users.length} total`;

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-state">No customers registered yet</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td>
                            <div style="display:flex;align-items:center;gap:10px">
                                <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;color:#fff;flex-shrink:0">${u.name.charAt(0).toUpperCase()}</div>
                                <span style="font-weight:600">${u.name}</span>
                            </div>
                        </td>
                        <td style="color:var(--text-secondary)">${u.email}</td>
                        <td style="color:var(--text-muted);font-size:.82rem">${formatDate(u.createdAt)}</td>
                    </tr>
                `).join('');
            } catch (err) { showToast(err.message, 'error'); }
        }
    </script>
</body>
</html>
