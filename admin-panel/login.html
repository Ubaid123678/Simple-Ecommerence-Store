<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — NovaMart</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div class="login-page">
        <div class="login-card animate-in">
            <div class="logo">
                <div class="icon">⚡</div>
                <h2>NovaMart Admin</h2>
                <p>Sign in to manage your store</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input class="form-input" type="email" id="email" placeholder="admin@novamart.com" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input class="form-input" type="password" id="password" placeholder="Enter admin password" required />
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;padding:13px;" id="loginBtn">Sign In</button>
            </form>
            <p style="text-align:center;margin-top:20px;font-size:.82rem;color:var(--text-muted)">
                Default: admin@novamart.com / admin123
            </p>
        </div>
    </div>

    <script src="js/admin-api.js"></script>
    <script>
        // Redirect if already logged in
        if (getAdmin()) window.location.href = 'index.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Signing in...';

            try {
                const data = await AdminAPI.login(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                localStorage.setItem('novamart_admin_token', data.token);
                localStorage.setItem('novamart_admin', JSON.stringify(data));
                window.location.href = 'index.html';
            } catch (error) {
                btn.disabled = false;
                btn.textContent = 'Sign In';
                // Simple inline error
                const errDiv = document.createElement('p');
                errDiv.style.cssText = 'color:var(--error);text-align:center;margin-top:12px;font-size:.85rem';
                errDiv.textContent = error.message;
                document.getElementById('loginForm').appendChild(errDiv);
                setTimeout(() => errDiv.remove(), 3000);
            }
        });
    </script>
</body>
</html>
