<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders — NovaMart Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebar-root"></div>
        <div class="main-content">
            <div id="topbar-root"></div>
            <div class="page-content">
                <div class="panel">
                    <div class="panel-header">
                        <h2>All Orders</h2>
                        <div class="actions">
                            <select class="form-input form-select" id="statusFilter" style="width:160px;padding:7px 12px;font-size:.82rem" onchange="filterOrders()">
                                <option value="">All Statuses</option>
                                <option value="Pending">Pending</option>
                                <option value="Processing">Processing</option>
                                <option value="Shipped">Shipped</option>
                                <option value="Delivered">Delivered</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                        </div>
                    </div>
                    <div class="panel-body">
                        <table class="data-table">
                            <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                            <tbody id="ordersTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Order Details</h2>
                <button class="modal-close" onclick="closeModal('orderModal')">✕</button>
            </div>
            <div id="orderDetail"></div>
        </div>
    </div>

    <script src="js/admin-api.js"></script>
    <script src="js/admin-ui.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/admin-socket.js"></script>
    <script>
        let allOrders = [];

        document.addEventListener('DOMContentLoaded', () => {
            initAdminPage('orders', 'Orders');
            loadOrders();
        });

        async function loadOrders() {
            const tbody = document.getElementById('ordersTable');
            try {
                allOrders = await AdminAPI.getOrders();
                renderOrders(allOrders);
            } catch (err) { showToast(err.message, 'error'); }
        }

        function filterOrders() {
            const status = document.getElementById('statusFilter').value;
            const filtered = status ? allOrders.filter(o => o.status === status) : allOrders;
            renderOrders(filtered);
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('ordersTable');
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No orders found</td></tr>';
                return;
            }
            tbody.innerHTML = orders.map(o => `
                <tr>
                    <td style="font-weight:600;color:var(--primary)">#${o._id.slice(-6).toUpperCase()}</td>
                    <td>${o.userId?.name || 'N/A'}</td>
                    <td>${o.items.length} item(s)</td>
                    <td style="font-weight:600">${formatMoney(o.total)}</td>
                    <td><span class="badge-status badge-${o.status.toLowerCase()}">${o.status}</span></td>
                    <td style="color:var(--text-muted);font-size:.82rem">${formatDate(o.createdAt)}</td>
                    <td>
                        <div style="display:flex;gap:6px">
                            <button class="btn btn-secondary btn-sm" onclick='viewOrder("${o._id}")'>View</button>
                            <select class="form-input form-select" style="width:120px;padding:5px 8px;font-size:.78rem" onchange="updateStatus('${o._id}', this.value)" value="${o.status}">
                                <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                                <option value="Processing" ${o.status==='Processing'?'selected':''}>Processing</option>
                                <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                                <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
                                <option value="Cancelled" ${o.status==='Cancelled'?'selected':''}>Cancelled</option>
                            </select>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, status) {
            try {
                await AdminAPI.updateOrderStatus(id, status);
                showToast(`Order status updated to ${status}`, 'success');
                loadOrders();
            } catch (err) { showToast(err.message, 'error'); }
        }

        function viewOrder(id) {
            const order = allOrders.find(o => o._id === id);
            if (!order) return;

            document.getElementById('orderDetail').innerHTML = `
                <div style="margin-bottom:16px">
                    <p style="font-size:.82rem;color:var(--text-muted)">Order ID</p>
                    <p style="font-weight:600;color:var(--primary)">#${order._id.slice(-6).toUpperCase()}</p>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px">
                    <div><p style="font-size:.82rem;color:var(--text-muted)">Customer</p><p style="font-weight:500">${order.userId?.name || 'N/A'}</p></div>
                    <div><p style="font-size:.82rem;color:var(--text-muted)">Date</p><p style="font-weight:500">${formatDate(order.createdAt)}</p></div>
                    <div><p style="font-size:.82rem;color:var(--text-muted)">Status</p><span class="badge-status badge-${order.status.toLowerCase()}">${order.status}</span></div>
                    <div><p style="font-size:.82rem;color:var(--text-muted)">Total</p><p style="font-weight:700;font-size:1.1rem">${formatMoney(order.total)}</p></div>
                </div>
                <h3 style="font-size:.92rem;margin-bottom:10px;padding-top:14px;border-top:1px solid var(--border)">Items</h3>
                ${order.items.map(item => `
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
                        <div><span style="font-weight:500">${item.name || 'Product'}</span> <span style="color:var(--text-muted)">× ${item.quantity}</span></div>
                        <span style="font-weight:600">${formatMoney(item.price * item.quantity)}</span>
                    </div>
                `).join('')}
                ${order.shippingAddress ? `
                    <h3 style="font-size:.92rem;margin:16px 0 8px">Shipping Address</h3>
                    <p style="color:var(--text-secondary);font-size:.88rem">${order.shippingAddress.street}, ${order.shippingAddress.city}, ${order.shippingAddress.zip}, ${order.shippingAddress.country}</p>
                ` : ''}
            `;
            openModal('orderModal');
        }
    </script>
</body>
</html>
