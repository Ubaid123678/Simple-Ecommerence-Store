<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — NovaMart</title>
    <meta name="description" content="Manage your NovaMart account, view orders and wishlist.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div id="navbar"></div>

    <div class="page-wrapper">
        <div class="container">
            <div class="profile-layout" id="profileContent">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/products.js"></script>
    <script src="js/wishlist.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/socket.js"></script>
    <script>
        let activeTab = 'orders';

        document.addEventListener('DOMContentLoaded', () => {
            initPage();

            const user = getUser();
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            if (window.location.hash === '#wishlist') activeTab = 'wishlist';

            renderProfile(user);
        });

        function renderProfile(user) {
            const container = document.getElementById('profileContent');
            container.innerHTML = `
                <div class="profile-sidebar animate-fade-in-up">
                    <div class="profile-avatar">${user.name.charAt(0).toUpperCase()}</div>
                    <div class="text-center" style="margin-bottom:24px;">
                        <h3 style="font-size:1.1rem;">${user.name}</h3>
                        <p class="text-muted" style="font-size:0.85rem;">${user.email}</p>
                    </div>
                    <nav class="profile-nav">
                        <a href="#orders" class="${activeTab === 'orders' ? 'active' : ''}" onclick="switchTab('orders')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                            My Orders
                        </a>
                        <a href="#wishlist" class="${activeTab === 'wishlist' ? 'active' : ''}" onclick="switchTab('wishlist')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            Wishlist
                        </a>
                        <a href="#" onclick="logout()" style="color:var(--error);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                            Log Out
                        </a>
                    </nav>
                </div>

                <div class="animate-fade-in-up" style="animation-delay:0.1s;">
                    <div id="tabContent"></div>
                </div>
            `;

            switchTab(activeTab);
        }

        function switchTab(tab) {
            activeTab = tab;
            window.location.hash = tab;

            // Update active
            document.querySelectorAll('.profile-nav a').forEach(a => a.classList.remove('active'));
            document.querySelector(`.profile-nav a[href="#${tab}"]`)?.classList.add('active');

            const tabContent = document.getElementById('tabContent');

            if (tab === 'orders') {
                loadOrders(tabContent);
            } else if (tab === 'wishlist') {
                tabContent.innerHTML = '<div id="wishlistContent"></div>';
                loadWishlist();
            }
        }

        async function loadOrders(container) {
            showLoading(container);
            try {
                const orders = await OrderAPI.getMine();
                
                if (orders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                            </div>
                            <h3>No orders yet</h3>
                            <p>Place your first order today!</p>
                            <a href="index.html" class="btn btn-primary">Shop Now</a>
                        </div>`;
                    return;
                }

                container.innerHTML = `
                    <h2 style="margin-bottom:20px;">My Orders</h2>
                    ${orders.map(order => {
                        const statusClass = 'status-' + order.status.toLowerCase();
                        return `
                        <div class="order-card">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                                <div>
                                    <span style="font-weight:600;">Order #${order._id.slice(-8).toUpperCase()}</span>
                                    <span class="text-muted" style="margin-left:12px;font-size:0.8rem;">${new Date(order.createdAt).toLocaleDateString()}</span>
                                </div>
                                <span class="order-status ${statusClass}">${order.status}</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <span class="text-muted">${order.items.length} item(s)</span>
                                <span style="font-weight:700;font-family:var(--font-heading);">$${order.total.toFixed(2)}</span>
                            </div>
                        </div>`;
                    }).join('')}
                `;
            } catch (error) {
                container.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${error.message}</p></div>`;
            }
        }
    </script>
</body>
</html>
