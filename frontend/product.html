<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details — NovaMart</title>
    <meta name="description" content="View product details, reviews, and add to your cart at NovaMart.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div id="navbar"></div>

    <div class="page-wrapper">
        <div class="container" id="productDetail">
            <!-- Loaded via JS -->
        </div>

        <!-- Reviews Section -->
        <div class="container">
            <div class="reviews-section">
                <h2 style="margin-bottom:24px;">Customer Reviews</h2>
                <div id="reviewsList">
                    <!-- Reviews loaded via JS -->
                </div>

                <!-- Review Form -->
                <div class="glass-card" style="padding:24px;margin-top:24px;max-width:600px;">
                    <h3 style="margin-bottom:16px;">Write a Review</h3>
                    <form onsubmit="submitReview(event)" id="reviewForm">
                        <div class="form-group">
                            <label class="form-label">Rating</label>
                            <select class="filter-select" id="reviewRating" required>
                                <option value="5">★★★★★ — Excellent</option>
                                <option value="4">★★★★☆ — Good</option>
                                <option value="3">★★★☆☆ — Average</option>
                                <option value="2">★★☆☆☆ — Poor</option>
                                <option value="1">★☆☆☆☆ — Terrible</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Comment</label>
                            <textarea class="form-input" id="reviewComment" placeholder="Share your experience..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Review</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/product-detail.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/socket.js"></script>
</body>
</html>
